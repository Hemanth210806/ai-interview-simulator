<!DOCTYPE html>
<html>
<head>
<title>Company Interview Practice</title>

<style>

body{
font-family:Arial;
background:#f5f7ff;
margin:0;
}

.container{
width:700px;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

select,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#667eea;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#4b5ed7;
}

.box{
background:#f5f7ff;
padding:15px;
border-radius:5px;
white-space:pre-line;
}

</style>
</head>

<body>

<div class="container">

<h2>Company Interview Practice</h2>

<label>Select Package</label>

<select id="package">
<option value="3-5 LPA">3-5 LPA</option>
<option value="5-8 LPA">5-8 LPA</option>
<option value="8-12 LPA">8-12 LPA</option>
</select>

<button onclick="getCompanies()">Find Companies</button>

<label>Company</label>

<select id="company">
<option value="">Choose Company</option>
</select>

<button onclick="getQuestions()">Generate Questions</button>

<h3>Interview Questions</h3>

<div id="questions" class="box"></div>

<h3>Your Answer</h3>

<textarea id="answer"></textarea>

<button onclick="evaluateAnswer()">Submit Answer</button>

<h3>AI Feedback</h3>

<div id="feedback" class="box"></div>

</div>

<script src="script.js"></script>

</body>
</html>
