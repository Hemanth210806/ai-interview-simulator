<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Viva & Placement Interview Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.auth-card{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
animation:cardPop 0.7s ease;
}

@keyframes cardPop{
from{transform:scale(0.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

h2{
text-align:center;
color:#667eea;
margin-bottom:5px;
}

p{
text-align:center;
margin-bottom:20px;
}

.tabs{
display:flex;
margin-bottom:20px;
}

.tabs div{
flex:1;
text-align:center;
padding:10px;
cursor:pointer;
border-bottom:2px solid transparent;
font-weight:600;
}

.tabs .active{
border-color:#667eea;
color:#667eea;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
background:#667eea;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#5563d1;
}

.hidden{
display:none;
}

.alert{
background:#ffeded;
color:#d8000c;
padding:8px;
margin-bottom:10px;
border-radius:5px;
text-align:center;
}

</style>
</head>

<body>

<div class="auth-card">

<h2>AI Simulator</h2>
<p>Student Portal</p>

<div id="alertBox" class="alert hidden"></div>

<div class="tabs">
<div id="tabLogin" class="active" onclick="switchTab('login')">Login</div>
<div id="tabRegister" onclick="switchTab('register')">Register</div>
</div>

<form id="loginForm">

<input type="text" id="loginUSN" placeholder="Enter USN" required>

<input type="password" id="loginPassword" placeholder="Password" required>

<button type="submit">Login to Dashboard</button>

</form>


<form id="registerForm" class="hidden">

<input type="text" id="regName" placeholder="Full Name" required>

<input type="text" id="regUSN" placeholder="USN" required>

<input type="password" id="regPassword" placeholder="Password" required>

<button type="submit">Create Account</button>

</form>

</div>

<script src="script.js"></script>

<script>

function switchTab(type){

document.getElementById("loginForm").classList.toggle("hidden",type!=="login");
document.getElementById("registerForm").classList.toggle("hidden",type!=="register");

document.getElementById("tabLogin").classList.toggle("active",type==="login");
document.getElementById("tabRegister").classList.toggle("active",type==="register");

}

document.getElementById("loginForm").addEventListener("submit",(e)=>{
e.preventDefault();
login();
});

document.getElementById("registerForm").addEventListener("submit",(e)=>{
e.preventDefault();
register();
});

</script>

</body>
</html>
