<!DOCTYPE html>
<html>
<head>
<title>Subject Viva Practice</title>

<style>

body{
font-family:Arial;
background:#f5f7ff;
margin:0;
}

.container{
width:700px;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

select,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#667eea;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#4b5ed7;
}

.box{
background:#f5f7ff;
padding:15px;
border-radius:5px;
white-space:pre-line;
}

</style>
</head>

<body>

<div class="container">

<h2>Subject Viva Practice</h2>

<label>Select Subject</label>

<select id="subject">
<option value="Data Structures">Data Structures</option>
<option value="DBMS">DBMS</option>
<option value="Operating Systems">Operating Systems</option>
<option value="Computer Networks">Computer Networks</option>
</select>

<button onclick="generateSubjectQuestions()">Generate Viva Questions</button>

<h3>Questions</h3>

<div id="questions" class="box"></div>

<h3>Your Answer</h3>

<textarea id="answer" rows="5"></textarea>

<button onclick="evaluateAnswer()">Submit Answer</button>

<h3>AI Feedback</h3>

<div id="feedback" class="box"></div>

</div>

<script src="script.js"></script>

<script>

async function generateSubjectQuestions(){

const subject=document.getElementById("subject").value;

const res=await fetch("/api/student/questions",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({company:subject})
});

const data=await res.json();

document.getElementById("questions").innerText=data.questions;

}

</script>

</body>
</html>
